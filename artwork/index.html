<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Gallery Beyond - Artwork Detail</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      body {
        background: #000;
      }

      .detail-page {
        position: relative;
        z-index: 10;
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 88px 24px 32px;
      }

      .back-exhibition {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 12px 32px;
        background: transparent;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        font-family: inherit;
        font-weight: 400;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        z-index: 50;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-size: 11px;
        backdrop-filter: blur(12px);
      }

      .back-exhibition:hover {
        background: rgba(255, 255, 255, 0.9);
        color: #050508;
        border-color: rgba(255, 255, 255, 0.9);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      }

      .detail-shell {
        width: min(1200px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.38);
        border-radius: 28px;
        padding: 28px;
        background: #000;
        box-shadow: 0 12px 42px rgba(0, 0, 0, 0.45);
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .title-row h1 {
        font-size: clamp(18px, 2.4vw, 26px);
        letter-spacing: 1px;
        font-weight: 600;
      }

      .tag {
        padding: 6px 12px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.76);
      }

      .content-grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 24px;
      }

      .viewer-card,
      .description-card {
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 20px;
        background: #000;
      }

      .viewer-card {
        min-height: 520px;
        display: flex;
        flex-direction: column;
      }

      .viewer-head {
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.18);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .viewer-head strong {
        letter-spacing: 2px;
        font-size: 12px;
        text-transform: uppercase;
      }

      .viewer-hint {
        color: rgba(255, 255, 255, 0.7);
        font-size: 11px;
        letter-spacing: 1px;
      }

      #viewer {
        flex: 1;
        min-height: 380px;
        background: #000;
        border-radius: 0 0 20px 20px;
      }

      .description-card {
        padding: 20px;
      }

      .description-title {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .meta {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 16px;
      }

      .description-body {
        font-size: 16px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.88);
      }

      @media (max-width: 980px) {
        .content-grid {
          grid-template-columns: 1fr;
        }

        .viewer-card {
          min-height: 440px;
        }
      }

      @media (max-width: 768px) {
        .back-exhibition {
          top: 14px;
          left: 14px;
          padding: 8px 20px;
          font-size: 10px;
          letter-spacing: 2px;
        }

        .detail-shell {
          border-radius: 20px;
          padding: 16px;
        }

        .viewer-head {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }

        .art-nav-wrap--prev {
          left: 12px;
        }

        .art-nav-wrap--next {
          right: 12px;
        }

        .art-nav-btn {
          width: 64px;
          height: 64px;
          font-size: 30px;
        }

        .art-nav-hint {
          font-size: 10px;
          letter-spacing: 2px;
        }
      }

      .art-nav-wrap {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        pointer-events: none;
      }

      .art-nav-wrap--prev {
        left: 20px;
      }

      .art-nav-wrap--next {
        right: 20px;
      }

      .art-nav-btn {
        pointer-events: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        margin: 0;
        padding: 0;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(5, 5, 8, 0.72);
        color: rgba(255, 255, 255, 0.92);
        font-size: 34px;
        line-height: 1;
        font-family: inherit;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease,
          transform 0.25s ease, box-shadow 0.25s ease;
        -webkit-appearance: none;
        appearance: none;
      }

      .art-nav-btn:hover {
        background: rgba(255, 255, 255, 0.9);
        color: #050508;
        border-color: rgba(255, 255, 255, 0.9);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      }

      .art-nav-hint {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.75);
        text-align: center;
        white-space: nowrap;
        pointer-events: none;
        font-family: inherit;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  </head>
  <body>
    <audio
      id="bgm-audio"
      src="../bgm.mp3"
      preload="auto"
      loop="true"
      style="display: none"
    ></audio>

    <a
      href="../exhibition/index.html"
      class="back-exhibition"
      onclick="navigateWithTransition('../exhibition/index.html'); return false;"
      >Back to Exhibition</a
    >

    <div class="art-nav-wrap art-nav-wrap--prev">
      <button
        type="button"
        id="art-nav-prev"
        class="art-nav-btn"
        aria-label="Previous artwork"
      >
        &#8249;
      </button>
      <span class="art-nav-hint" aria-hidden="true">Previous</span>
    </div>
    <div class="art-nav-wrap art-nav-wrap--next">
      <button
        type="button"
        id="art-nav-next"
        class="art-nav-btn"
        aria-label="Next artwork"
      >
        &#8250;
      </button>
      <span class="art-nav-hint" aria-hidden="true">Next</span>
    </div>

    <main class="detail-page">
      <section class="detail-shell">
        <div class="title-row">
          <h1 id="page-title">Artwork Detail</h1>
          <span class="tag">Digital Presentation</span>
        </div>

        <div class="content-grid">
          <article class="viewer-card">
            <header class="viewer-head">
              <strong id="viewer-label">Interactive View</strong>
              <span class="viewer-hint">Drag to rotate, scroll to zoom</span>
            </header>
            <div id="viewer"></div>
          </article>

          <aside class="description-card">
            <h2 class="description-title" id="art-title"></h2>
            <p class="meta" id="art-meta"></p>
            <p class="description-body" id="art-description"></p>
          </aside>
        </div>
      </section>
    </main>

    <script src="../js/bgm.js"></script>
    <script src="../js/transition.js"></script>
    <script src="../js/starfield.js"></script>
    <script>
      (function () {
        var ART_ORDER = ['monet', 'wally', 'hornet'];

        var ARTWORKS = {
          monet: {
            title: 'Impression, Sunrise',
            meta: 'Claude Monet | 1872',
            description:
              "This painting is famous for giving a name to the Impressionist movement. It depicts the port of Le Havre, Monet's hometown, and captures the ephemeral effects of light and color at dawn. The blurred outlines and focus on light were highly controversial at the time.",
            image: '../art.png',
            model: ''
          },
          wally: {
            title: 'Portrait of Wally Neuzil',
            meta: 'Egon Schiele | 1912',
            description:
              "This iconic portrait depicts Walburga 'Wally' Neuzil, Schiele's muse and lover. Known for its emotional intensity and the subject's captivating, melancholic gaze, it is considered a true masterpiece of Austrian Expressionism.",
            image: '../art2.png',
            model: ''
          },
          hornet: {
            title: 'Hornet',
            meta: '3D model | placeholder',
            description:
              'Placeholder copy for this piece. Replace with your artist statement, process notes, or credits. The viewer loads the same GLB used in the exhibition.',
            image: '../shaw-hornet-hollow-knight-silksong/textures/HEAD DIFUSE_2.png',
            model: '../shaw-hornet-hollow-knight-silksong/source/HORNET.glb'
          }
        };

        function getArtId() {
          var raw = null;

          var p = new URLSearchParams(window.location.search);
          var q = p.get('art');
          if (q) raw = q.trim();

          if (!raw && window.location.hash && window.location.hash.length > 1) {
            var h = decodeURIComponent(window.location.hash.slice(1)).trim();
            if (h.indexOf('art=') === 0) {
              raw = decodeURIComponent(h.slice(4)).trim();
            } else if (h) {
              raw = h;
            }
          }

          if (!raw) {
            try {
              raw = sessionStorage.getItem('galleryDetailArt');
              if (raw) sessionStorage.removeItem('galleryDetailArt');
            } catch (e) {}
          }

          if (!raw) {
            try {
              raw = sessionStorage.getItem('galleryLastArt');
              if (raw) sessionStorage.removeItem('galleryLastArt');
            } catch (e) {}
          }

          if (raw) raw = String(raw).trim();
          if (raw && ARTWORKS[raw]) return raw;
          return 'monet';
        }

        function navigateToArt(artId) {
          if (!artId || !ARTWORKS[artId]) return;
          try {
            sessionStorage.setItem('galleryLastArt', artId);
            sessionStorage.setItem('galleryDetailArt', artId);
          } catch (e) {}
          var u = new URL('index.html', window.location.href);
          u.searchParams.set('art', artId);
          u.hash = artId;
          navigateWithTransition(u.href);
        }

        function goAdjacent(delta) {
          var cur = getArtId();
          var idx = ART_ORDER.indexOf(cur);
          if (idx < 0) idx = 0;
          var n =
            (idx + delta + ART_ORDER.length) % ART_ORDER.length;
          navigateToArt(ART_ORDER[n]);
        }

        document.getElementById('art-nav-prev').addEventListener('click', function () {
          goAdjacent(-1);
        });
        document.getElementById('art-nav-next').addEventListener('click', function () {
          goAdjacent(1);
        });

        document.addEventListener('keydown', function (e) {
          if (!e.shiftKey) return;
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            goAdjacent(-1);
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            goAdjacent(1);
          }
        });

        function fitCameraToObject(camera, obj, controls) {
          var box = new THREE.Box3().setFromObject(obj);
          var size = box.getSize(new THREE.Vector3());
          var center = box.getCenter(new THREE.Vector3());
          var maxSize = Math.max(size.x, size.y, size.z);
          var fov = camera.fov * (Math.PI / 180);
          var distance = maxSize / (2 * Math.tan(fov / 2));

          distance *= 1.5;
          camera.position.set(center.x, center.y, center.z + distance);
          camera.near = Math.max(distance / 100, 0.01);
          camera.far = distance * 100;
          camera.updateProjectionMatrix();
          controls.target.copy(center);
          controls.update();
        }

        function initViewer(config) {
          var container = document.getElementById('viewer');
          var scene = new THREE.Scene();
          scene.background = new THREE.Color(0x000000);

          var camera = new THREE.PerspectiveCamera(
            50,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
          );
          camera.position.set(0, 0, 4);

          var renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setPixelRatio(window.devicePixelRatio || 1);
          renderer.setSize(container.clientWidth, container.clientHeight);
          container.appendChild(renderer.domElement);

          var ambient = new THREE.AmbientLight(0xffffff, 0.9);
          scene.add(ambient);
          var keyLight = new THREE.DirectionalLight(0xffffff, 0.7);
          keyLight.position.set(3, 3, 4);
          scene.add(keyLight);

          var controls = new THREE.OrbitControls(camera, renderer.domElement);
          controls.enableDamping = true;
          controls.dampingFactor = 0.08;
          controls.enablePan = false;
          controls.minDistance = 1;
          controls.maxDistance = 12;

          function resolveAssetUrl(url) {
            if (!url) return url;
            return url.indexOf(' ') >= 0 ? encodeURI(url) : url;
          }

          function addImagePlane() {
            var texLoader = new THREE.TextureLoader();
            texLoader.load(resolveAssetUrl(config.image), function (texture) {
              var ratio = texture.image.width / texture.image.height;
              var height = 2.2;
              var width = height * ratio;
              var geom = new THREE.PlaneGeometry(width, height);
              var mat = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.85,
                metalness: 0
              });
              var mesh = new THREE.Mesh(geom, mat);
              scene.add(mesh);
              fitCameraToObject(camera, mesh, controls);
            });
          }

          if (config.model) {
            var gltfLoader = new THREE.GLTFLoader();
            gltfLoader.load(
              resolveAssetUrl(config.model),
              function (gltf) {
                scene.add(gltf.scene);
                fitCameraToObject(camera, gltf.scene, controls);
              },
              undefined,
              function () {
                addImagePlane();
              }
            );
          } else {
            addImagePlane();
          }

          function onResize() {
            var w = container.clientWidth;
            var h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
          }
          window.addEventListener('resize', onResize);

          function tick() {
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(tick);
          }
          tick();
        }

        var artId = getArtId();
        var data = ARTWORKS[artId] || ARTWORKS.monet;

        document.getElementById('page-title').textContent = data.title;
        document.getElementById('art-title').textContent = data.title;
        document.getElementById('art-meta').textContent = data.meta;
        document.getElementById('art-description').textContent = data.description;
        document.getElementById('viewer-label').textContent = data.model
          ? '3D Model'
          : 'HD Image';

        initViewer(data);
      })();
    </script>
  </body>
</html>
