<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <title>Gallery Beyond - 360 Tour</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
    <style>
      .back-home,
      .tour-status,
      .point-jump {
        position: fixed;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(5, 5, 8, 0.35);
        backdrop-filter: blur(12px);
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 11px;
        z-index: 60;
      }
      .back-home {
        top: 20px;
        left: 20px;
        text-decoration: none;
        padding: 12px 32px;
      }
      .tour-status {
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
      }
      .point-jump {
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 8px;
        text-transform: none;
      }
      .point-jump button {
        min-width: 40px;
        height: 36px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: transparent;
        color: rgba(255, 255, 255, 0.92);
        cursor: pointer;
      }
      .point-jump button.active {
        background: rgba(255, 255, 255, 0.9);
        color: #050508;
      }
      .fade-overlay {
        position: fixed;
        inset: 0;
        background: #050508;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 55;
      }
      .fade-overlay.active {
        opacity: 0.6;
      }
      .edge-nav {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        width: 72px;
        height: 72px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.94);
        font-size: 28px;
        line-height: 1;
        z-index: 70;
        cursor: pointer;
      }
      .edge-nav.left {
        left: 20px;
      }
      .edge-nav.right {
        right: 20px;
      }
      .edge-nav:hover {
        background: rgba(255, 255, 255, 0.22);
      }
    </style>
  </head>
  <body>
    <a href="../index.html" class="back-home" onclick="navigateWithTransition('../index.html'); return false;">Back to Main Menu</a>
    <div class="tour-status" id="tour-status">Point P1 / 8</div>
    <div class="point-jump" id="point-jump"></div>
    <button type="button" id="nav-prev-btn" class="edge-nav left" aria-label="Previous point">&lt;</button>
    <button type="button" id="nav-next-btn" class="edge-nav right" aria-label="Next point">&gt;</button>
    <div class="fade-overlay" id="fade-overlay"></div>
    <a-scene renderer="antialias: true">
      <a-assets>
        <img id="p1" src="../360/location/p1.JPG" crossorigin="anonymous" />
        <img id="p2" src="../360/location/p2.JPG" crossorigin="anonymous" />
        <img id="p3" src="../360/location/p3.JPG" crossorigin="anonymous" />
        <img id="p4" src="../360/location/p4.JPG" crossorigin="anonymous" />
        <img id="p5" src="../360/location/p5.JPG" crossorigin="anonymous" />
        <img id="p6" src="../360/location/p6.JPG" crossorigin="anonymous" />
        <img id="p7" src="../360/location/p7.JPG" crossorigin="anonymous" />
        <img id="p8" src="../360/location/p8.JPG" crossorigin="anonymous" />
        <audio id="bgm-audio" src="../bgm.mp3" preload="auto" loop="true"></audio>
      </a-assets>
      <a-sky id="main-sky" src="#p1" rotation="0 -90 0"></a-sky>
      <a-entity id="hotspot-layer"></a-entity>
      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="white" raycaster="objects: .clickable"></a-cursor>
      </a-entity>
    </a-scene>
    <script src="../js/bgm.js"></script>
    <script src="../js/transition.js"></script>
    <script>
      var TOUR_POINTS = {
        p1: { links: [{ to: 'p2', yaw: -27, pitch: 5 }] },
        p2: { links: [{ to: 'p1', yaw: 145, pitch: 12 }, { to: 'p3', yaw: -60, pitch: -6, roll: 10 }] },
        p3: { links: [{ to: 'p2', yaw: 275, pitch: -5 }, { to: 'p4', yaw: 28, pitch: -1 }] },
        p4: {
          links: [
            { to: 'p3', yaw: 10, pitch: 2 },
            { to: 'p5', yaw: 170, pitch: -2 },
            { to: 'p1', yaw: 110, pitch: 5 }
          ]
        },
        p5: { links: [{ to: 'p4', yaw: 172, pitch: -4 }, { to: 'p6', yaw: 80, pitch: 1 }] },
        p6: { links: [{ to: 'p5', yaw: 162, pitch: 4 }, { to: 'p7', yaw: -108, pitch: 0 }] },
        p7: { links: [{ to: 'p6', yaw: 64, pitch: 0 }, { to: 'p8', yaw: 158, pitch: 6 }] },
        p8: {
          links: [
            { to: 'p7', yaw: 50, pitch: 7 },
            { to: 'p5', yaw: 120, pitch: 6 }
          ]
        }
      };
      // 底部导航/左右箭头的顺序（按 p1-8 排开）
      var POINT_ORDER = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8'];

      var currentPoint = 'p1';
      var switchLocked = false;
      var hotspotLayer = document.getElementById('hotspot-layer');
      var sky = document.getElementById('main-sky');
      var statusEl = document.getElementById('tour-status');
      var jumpEl = document.getElementById('point-jump');
      var fadeEl = document.getElementById('fade-overlay');
      var navPrevBtn = document.getElementById('nav-prev-btn');
      var navNextBtn = document.getElementById('nav-next-btn');

      // 界面显示使用真实点位编号（p1~p8）
      function displayName(pointId) {
        return pointId;
      }

      function toPosition(yawDeg, pitchDeg, radius) {
        var yaw = (yawDeg * Math.PI) / 180;
        var pitch = (pitchDeg * Math.PI) / 180;
        var x = radius * Math.sin(yaw) * Math.cos(pitch);
        var y = radius * Math.sin(pitch);
        var z = -radius * Math.cos(yaw) * Math.cos(pitch);
        return x + ' ' + y + ' ' + z;
      }

      function createHotspot(link) {
        var node = document.createElement('a-entity');
        node.setAttribute('position', toPosition(link.yaw, link.pitch, 4));
        node.setAttribute('data-target', link.to);
        node.setAttribute('look-at', '[camera]');
        var roll = typeof link.roll === 'number' ? link.roll : 0;

        var icon = document.createElement('a-circle');
        icon.classList.add('clickable');
        icon.setAttribute('radius', '0.208');
        icon.setAttribute('material', 'shader: flat; color: #ffffff; transparent: true; opacity: 0.2; side: double');
        icon.setAttribute('rotation', '0 0 ' + roll);
        node.appendChild(icon);

        var ring = document.createElement('a-ring');
        ring.classList.add('clickable');
        ring.setAttribute('radius-inner', '0.24');
        ring.setAttribute('radius-outer', '0.272');
        ring.setAttribute('material', 'shader: flat; color: #ffffff; transparent: true; opacity: 0.9; side: double');
        ring.setAttribute('rotation', '0 0 ' + roll);
        node.appendChild(ring);

        var text = document.createElement('a-text');
        text.setAttribute(
          'value',
          'Go ' + displayName(link.to).toUpperCase()
        );
        text.setAttribute('position', '0 0.42 0');
        text.setAttribute('align', 'center');
        text.setAttribute('color', '#ffffff');
        text.setAttribute('width', '2.3');
        text.setAttribute('letter-spacing', '2');
        node.appendChild(text);

        function handlePick() {
          if (!switchLocked) goToPoint(link.to);
        }
        node.addEventListener('click', handlePick);
        icon.addEventListener('click', handlePick);
        ring.addEventListener('click', handlePick);
        return node;
      }

      function getAdjacentPoint(step) {
        var idx = POINT_ORDER.indexOf(currentPoint);
        if (idx < 0) idx = 0;
        var nextIdx = (idx + step + POINT_ORDER.length) % POINT_ORDER.length;
        return POINT_ORDER[nextIdx];
      }

      function renderJumpButtons() {
        jumpEl.innerHTML = '';
        var ids = POINT_ORDER;
        ids.forEach(function (id) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = displayName(id).toUpperCase();
          if (id === currentPoint) btn.classList.add('active');
          btn.addEventListener('click', function () {
            if (!switchLocked) goToPoint(id);
          });
          jumpEl.appendChild(btn);
        });
      }

      function renderCurrentPoint() {
        sky.setAttribute('src', '#' + currentPoint);
        hotspotLayer.innerHTML = '';
        var links = TOUR_POINTS[currentPoint].links;
        links.forEach(function (link) {
          hotspotLayer.appendChild(createHotspot(link));
        });
        statusEl.textContent =
          'Point ' + displayName(currentPoint).toUpperCase() + ' / 8';
        renderJumpButtons();
      }

      function goToPoint(pointId) {
        if (!TOUR_POINTS[pointId] || pointId === currentPoint) return;
        switchLocked = true;
        fadeEl.classList.add('active');
        setTimeout(function () {
          currentPoint = pointId;
          renderCurrentPoint();
          fadeEl.classList.remove('active');
          setTimeout(function () {
            switchLocked = false;
          }, 120);
        }, 200);
      }

      function setupArrowNavigation() {
        if (navPrevBtn) {
          navPrevBtn.addEventListener('click', function () {
            if (!switchLocked) goToPoint(getAdjacentPoint(-1));
          });
        }
        if (navNextBtn) {
          navNextBtn.addEventListener('click', function () {
            if (!switchLocked) goToPoint(getAdjacentPoint(1));
          });
        }
      }

      (function () {
        var scene = document.querySelector('a-scene');
        if (!scene) return;
        function boot() {
          setupArrowNavigation();
          renderCurrentPoint();
        }
        if (scene.hasLoaded) boot();
        else scene.addEventListener('loaded', boot);
      })();
    </script>
  </body>
</html>
