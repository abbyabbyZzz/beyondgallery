<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <title>Gallery Beyond - 360 Tour</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="exhibition-marzipano.css" />
    <style>
      .back-home,
      .tour-hint {
        position: fixed;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(5, 5, 8, 0.35);
        backdrop-filter: blur(12px);
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 11px;
        z-index: 60;
      }
      .back-home {
        top: 20px;
        left: 20px;
        text-decoration: none;
        padding: 12px 32px;
      }
      .point-dropdown-wrap {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 60;
        width: 60px;
        height: 60px;
        text-transform: none;
      }
      .point-dropdown-btn {
        box-sizing: border-box;
        width: 60px;
        height: 60px;
        padding: 0;
        margin: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: rgba(5, 5, 8, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: rgba(255, 255, 255, 0.95);
        letter-spacing: 2px;
        font-size: 13px;
        font-weight: 500;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      .point-dropdown-btn:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.65);
      }
      .point-dropdown-btn:focus-visible {
        outline: 1px solid rgba(255, 255, 255, 0.35);
        outline-offset: 3px;
      }
      .point-dropdown-panel {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        left: auto;
        width: max-content;
        max-width: min(calc(100vw - 40px), 300px);
        padding: 12px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(5, 5, 8, 0.42);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: none;
        display: grid;
        grid-template-columns: repeat(4, 48px);
        grid-template-rows: repeat(2, 48px);
        gap: 10px;
        max-height: none;
        overflow: visible;
      }
      .point-dropdown-panel .point-dropdown-opt {
        box-sizing: border-box;
        width: 48px;
        height: 48px;
        min-width: 48px;
        min-height: 48px;
        padding: 0;
        margin: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.42);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        font-weight: 500;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: 1.5px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      .point-dropdown-panel .point-dropdown-opt:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.55);
      }
      .point-dropdown-panel .point-dropdown-opt.is-current {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.12);
      }
      .point-dropdown-panel .point-dropdown-opt:focus-visible {
        outline: 1px solid rgba(255, 255, 255, 0.4);
        outline-offset: 2px;
      }
      @media (max-width: 360px) {
        .point-dropdown-panel {
          grid-template-columns: repeat(4, 42px);
          grid-template-rows: repeat(2, 42px);
          gap: 8px;
          padding: 10px;
        }
        .point-dropdown-panel .point-dropdown-opt {
          width: 42px;
          height: 42px;
          min-width: 42px;
          min-height: 42px;
          font-size: 11px;
        }
      }
      .tour-hint {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: 2px;
        text-transform: uppercase;
        pointer-events: none;
        white-space: nowrap;
      }
      @media (max-width: 768px) {
        .tour-hint {
          display: none;
        }
      }
      /* Work dropdown: opens upward, frosted glass */
      .work-dropdown-wrap {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 70;
        min-width: 300px;
        width: min(360px, calc(100vw - 40px));
        text-transform: none;
      }
      .work-dropdown-btn {
        width: 100%;
        padding: 12px 20px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(5, 5, 8, 0.35);
        color: rgba(255, 255, 255, 0.92);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: none;
      }
      .work-dropdown-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.6);
      }
      .work-dropdown-panel {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 100%;
        margin-bottom: 8px;
        max-height: min(52vh, 420px);
        overflow-y: auto;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(5, 5, 8, 0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: none;
      }
      .work-dropdown-panel::-webkit-scrollbar {
        width: 7px;
      }
      .work-dropdown-panel::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.14);
        border-radius: 4px;
      }
      .work-dropdown-panel::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 4px;
      }
      .work-dropdown-panel button {
        display: block;
        width: 100%;
        padding: 11px 16px;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        background: transparent;
        color: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        text-align: left;
        cursor: pointer;
        letter-spacing: 1.2px;
      }
      .work-dropdown-panel button:last-child {
        border-bottom: none;
      }
      .work-dropdown-panel button:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .fade-overlay {
        position: fixed;
        inset: 0;
        background: #050508;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 55;
      }
      .fade-overlay.active {
        opacity: 0.6;
      }
      .edge-nav {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        width: 72px;
        height: 72px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.94);
        font-size: 28px;
        line-height: 1;
        z-index: 70;
        cursor: pointer;
      }
      .edge-nav.left {
        left: 20px;
      }
      .edge-nav.right {
        right: 20px;
      }
      .edge-nav:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      /* Works list: hover + double-click to open */
      .work-dropdown-panel button.work-item {
        position: relative;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          transform 0.18s ease,
          box-shadow 0.2s ease;
        border-left: 2px solid transparent;
      }
      .work-dropdown-panel button.work-item:hover {
        background: rgba(255, 255, 255, 0.09);
        border-left-color: rgba(255, 255, 255, 0.45);
        transform: translateX(3px);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
      .work-dropdown-panel button.work-item:focus-visible {
        outline: 1px solid rgba(255, 255, 255, 0.35);
        outline-offset: -2px;
      }

    </style>
  </head>
  <body>
    <div class="rotate-overlay" id="rotate-overlay" aria-hidden="true">
      <div class="rotate-card" role="dialog" aria-modal="true" aria-label="Rotate device">
        <div class="rotate-label">Notice</div>
        <div class="rotate-title">Please rotate your device</div>
        <p class="rotate-desc">This experience is best viewed in landscape orientation.</p>
      </div>
    </div>
    <!-- Full-screen viewer first so fixed UI (z-index) and later siblings stack above -->
    <div id="marzipano-viewer" class="marzipano-viewer" aria-label="360 exhibition view"></div>
    <a href="../index.html" class="back-home" onclick="navigateWithTransition('../index.html'); return false;">Back to Main Menu</a>
    <div class="point-dropdown-wrap" id="point-dropdown-wrap">
      <button
        type="button"
        class="point-dropdown-btn"
        id="point-dropdown-btn"
        aria-expanded="false"
        aria-haspopup="listbox"
        aria-label="Choose tour point"
      >
        <span id="point-dropdown-label">P1</span>
      </button>
      <div
        class="point-dropdown-panel ui-dropdown-panel"
        id="point-dropdown-panel"
        role="listbox"
        aria-label="Tour points 1 to 8"
      ></div>
    </div>
    <div class="tour-hint" id="tour-hint">Drag to look around</div>
    <div class="work-dropdown-wrap" id="work-dropdown-wrap">
      <button type="button" class="work-dropdown-btn" id="work-dropdown-btn" aria-expanded="false" aria-haspopup="listbox">
        Works ▾
      </button>
      <div
        class="work-dropdown-panel ui-dropdown-panel ui-dropdown-panel--up"
        id="work-dropdown-panel"
        role="listbox"
        aria-label="Works 1 to 23"
      ></div>
    </div>
    <button type="button" id="nav-prev-btn" class="edge-nav left" aria-label="Previous point">&lt;</button>
    <button type="button" id="nav-next-btn" class="edge-nav right" aria-label="Next point">&gt;</button>
    <div class="fade-overlay" id="fade-overlay"></div>
    <audio id="bgm-audio" src="../bgm.mp3" preload="auto" loop="true"></audio>
    <!-- Marzipano demo expects bowser/screenfull globals; stubs are enough for the viewer -->
    <script>
      window.bowser = window.bowser || { msie: false, version: '99' };
      window.screenfull =
        window.screenfull ||
        {
          enabled: false,
          isFullscreen: false,
          request: function () {},
          exit: function () {},
          toggle: function () {},
          on: function () {}
        };
    </script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/marzipano/0.10.2/marzipano.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <!-- Offline: put export’s marzipano.js at marzipano/vendor/marzipano.js and swap the src above -->
    <script src="marzipano/data.js"></script>
    <script src="../js/exhibition-marzipano.js"></script>
    <script src="../js/bgm.js"></script>
    <script src="../js/transition.js"></script>
    <script>
      (function () {
        function shouldBlockPortrait() {
          var isCoarse = false;
          try {
            isCoarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
          } catch (e) {}
          // treat small screens as "mobile" even if matchMedia isn't supported
          var small = Math.min(window.innerWidth || 0, window.innerHeight || 0) <= 820;
          var isMobileLike = isCoarse || small;
          var isPortrait = (window.innerHeight || 0) > (window.innerWidth || 0);
          return isMobileLike && isPortrait;
        }

        function updateRotateOverlay() {
          var el = document.getElementById('rotate-overlay');
          if (!el) return;
          var show = shouldBlockPortrait();
          el.classList.toggle('is-visible', show);
          el.setAttribute('aria-hidden', show ? 'false' : 'true');
        }

        window.addEventListener('resize', updateRotateOverlay);
        window.addEventListener('orientationchange', updateRotateOverlay);
        updateRotateOverlay();
      })();

      var TOUR_POINTS = {
        p1: {
          links: [
            { to: 'p2', yaw: -27, pitch: 5 },
            // p1→p2 base, then 40° left (yaw −40)
            { to: 'p4', yaw: -47, pitch: 5 }
          ]
        },
        p2: {
          links: [
            { to: 'p1', yaw: 142, pitch: 7 },
            { to: 'p3', yaw: -90, pitch: -46, roll: 10 },
            // Between p1 and p3: ~45° along great circle from p1 toward p3
            { to: 'p4', yaw: 172, pitch: -27 }
          ]
        },
        p3: { links: [{ to: 'p2', yaw: 305, pitch: -5 }, { to: 'p4', yaw: 28, pitch: -1 }] },
        p4: {
          links: [
            { to: 'p3', yaw: 10, pitch: 2 },
            { to: 'p5', yaw: 190, pitch: -17 },
            { to: 'p1', yaw: 110, pitch: 5 }
          ]
        },
        p5: { links: [{ to: 'p4', yaw: 172, pitch: -4 }, { to: 'p6', yaw: 80, pitch: 1 }] },
        p6: {
          links: [
            { to: 'p5', yaw: 162, pitch: -9 },
            // Bisector of p6→p5 and p6→p7 (normalized sum)
            { to: 'p8', yaw: -146, pitch: 19 },
            { to: 'p7', yaw: -113, pitch: -8 }
          ]
        },
        p7: { links: [{ to: 'p6', yaw: 89, pitch: 0 }, { to: 'p8', yaw: 158, pitch: 6 }] },
        p8: {
          links: [
            { to: 'p7', yaw: 50, pitch: 7 },
            { to: 'p5', yaw: 120, pitch: 6 }
          ]
        }
      };
      // Order for bottom bar / edge arrows (p1–p8)
      var POINT_ORDER = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8'];

      var currentPoint = 'p1';
      var switchLocked = false;
      var pointDropdownWrap = document.getElementById('point-dropdown-wrap');
      var pointDropdownBtn = document.getElementById('point-dropdown-btn');
      var pointDropdownPanel = document.getElementById('point-dropdown-panel');
      var workDropdownWrap = document.getElementById('work-dropdown-wrap');
      var workDropdownBtn = document.getElementById('work-dropdown-btn');
      var workDropdownPanel = document.getElementById('work-dropdown-panel');
      var fadeEl = document.getElementById('fade-overlay');
      var navPrevBtn = document.getElementById('nav-prev-btn');
      var navNextBtn = document.getElementById('nav-next-btn');
      var WORK_COUNT = 23;

      // Work titles (keep in sync with artwork-360 WORK_META titles)
      var WORK_MENU_TITLES = {
        1: 'Orchard',
        2: 'Wanderer / Angel Eyes',
        3: 'Allegory of Creation',
        4: 'A Quite Temptation',
        5: 'Inheritance',
        6: 'Inner',
        7: 'Anonymous Was a Woman',
        8: 'The Space I Take',
        9: 'The Golden Temple',
        10: 'ALIEN',
        11: 'Superstitious',
        12: 'Soft Armor, Heavy Heart',
        13: 'Embodied Moonlight Garden',
        14: 'Manufactured Self / Toward the Window',
        15: 'Serious Actor',
        16: 'In the Other Room and Metamorphoses',
        17: 'State: White',
        18: 'Erindale',
        19: 'The Blossoms in 4AM',
        20: 'Lineage',
        21: 'Depth Perception',
        22: 'Colour Yield Memory’s Key (CYMK)',
        23: 'Dry Brush Self Portrait'
      };

      function getWorkMenuLabel(id) {
        var title = WORK_MENU_TITLES[id];
        if (title != null && String(title).trim()) return String(title).trim();
        return 'Work ' + id;
      }

      // Display uses point ids p1–p8
      function displayName(pointId) {
        return pointId;
      }

      /** UI label: P1 … P8 (matches site typography) */
      function formatPointLabel(pointId) {
        var s = String(pointId || '');
        return s.replace(/^p/i, 'P');
      }

      function closeOtherDropdown(except) {
        if (except !== 'point' && pointDropdownPanel && pointDropdownBtn) {
          pointDropdownPanel.classList.remove('open');
          pointDropdownBtn.setAttribute('aria-expanded', 'false');
        }
        if (except !== 'work' && workDropdownPanel && workDropdownBtn) {
          workDropdownPanel.classList.remove('open');
          workDropdownBtn.setAttribute('aria-expanded', 'false');
        }
      }

      function updateTourChrome() {
        var labelEl = document.getElementById('point-dropdown-label');
        if (labelEl) {
          labelEl.textContent = formatPointLabel(currentPoint);
        }
        if (pointDropdownBtn) {
          pointDropdownBtn.setAttribute(
            'aria-label',
            'Current point ' + formatPointLabel(currentPoint) + ', open point menu'
          );
        }
        if (pointDropdownPanel) {
          var opts = pointDropdownPanel.querySelectorAll('[role="option"]');
          for (var i = 0; i < opts.length; i++) {
            opts[i].classList.toggle('is-current', POINT_ORDER[i] === currentPoint);
          }
        }
      }

      function setPointDropdownOpen(open) {
        if (!pointDropdownPanel || !pointDropdownBtn) return;
        pointDropdownPanel.classList.toggle('open', open);
        pointDropdownBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) closeOtherDropdown('point');
      }

      function getAdjacentPoint(step) {
        var idx = POINT_ORDER.indexOf(currentPoint);
        if (idx < 0) idx = 0;
        var nextIdx = (idx + step + POINT_ORDER.length) % POINT_ORDER.length;
        return POINT_ORDER[nextIdx];
      }

      function setWorkDropdownOpen(open) {
        if (!workDropdownPanel || !workDropdownBtn) return;
        workDropdownPanel.classList.toggle('open', open);
        workDropdownBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) closeOtherDropdown('work');
      }

      function initPointDropdown() {
        if (!pointDropdownPanel || !pointDropdownBtn || !pointDropdownWrap) return;
        pointDropdownPanel.innerHTML = '';
        for (var pi = 0; pi < POINT_ORDER.length; pi++) {
          (function (pid) {
            var opt = document.createElement('button');
            opt.type = 'button';
            opt.className = 'point-dropdown-opt';
            opt.setAttribute('role', 'option');
            opt.textContent = formatPointLabel(pid);
            opt.addEventListener('click', function () {
              setPointDropdownOpen(false);
              if (!switchLocked) goToPoint(pid);
            });
            pointDropdownPanel.appendChild(opt);
          })(POINT_ORDER[pi]);
        }
        pointDropdownBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          setPointDropdownOpen(!pointDropdownPanel.classList.contains('open'));
        });
        pointDropdownWrap.addEventListener('click', function (e) {
          e.stopPropagation();
        });
      }

      function initWorkDropdown() {
        if (!workDropdownPanel || !workDropdownBtn || !workDropdownWrap) return;
        workDropdownPanel.innerHTML = '';
        for (var n = 1; n <= WORK_COUNT; n++) {
          (function (id) {
            var opt = document.createElement('button');
            opt.type = 'button';
            opt.setAttribute('role', 'option');
            opt.textContent = getWorkMenuLabel(id);
            opt.addEventListener('click', function () {
              setWorkDropdownOpen(false);
              navigateWithTransition('../artwork-360/index.html?id=' + id);
            });
            workDropdownPanel.appendChild(opt);
          })(n);
        }
        workDropdownBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          setWorkDropdownOpen(!workDropdownPanel.classList.contains('open'));
        });
        document.addEventListener('click', function () {
          closeOtherDropdown('');
        });
        workDropdownWrap.addEventListener('click', function (e) {
          e.stopPropagation();
        });
      }

      function goToPoint(pointId) {
        if (!TOUR_POINTS[pointId] || pointId === currentPoint) return;
        switchLocked = true;
        fadeEl.classList.add('active');
        setTimeout(function () {
          currentPoint = pointId;
          if (window.ExhibitionMarzipano && typeof ExhibitionMarzipano.switchToPoint === 'function') {
            ExhibitionMarzipano.switchToPoint(currentPoint);
          }
          updateTourChrome();
          fadeEl.classList.remove('active');
          setTimeout(function () {
            switchLocked = false;
          }, 120);
        }, 200);
      }

      /** Public hook for 360 sync: viewpoint id 1–8 → panorama p1–p8 */
      function goToViewpoint(id) {
        var n = typeof id === 'number' ? id : parseInt(String(id), 10);
        if (isNaN(n) || n < 1 || n > 8) return;
        goToPoint('p' + n);
      }
      window.goToViewpoint = goToViewpoint;

      function setupArrowNavigation() {
        if (navPrevBtn) {
          navPrevBtn.addEventListener('click', function () {
            if (!switchLocked) goToPoint(getAdjacentPoint(-1));
          });
        }
        if (navNextBtn) {
          navNextBtn.addEventListener('click', function () {
            if (!switchLocked) goToPoint(getAdjacentPoint(1));
          });
        }
      }

      (function () {
        function boot() {
          initPointDropdown();
          initWorkDropdown();
          if (window.ExhibitionMarzipano && typeof ExhibitionMarzipano.init === 'function') {
            ExhibitionMarzipano.init({ onNavigateToPanorama: goToPoint });
            ExhibitionMarzipano.switchToPoint(currentPoint);
          }
          setupArrowNavigation();
          updateTourChrome();
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot);
        } else {
          boot();
        }
      })();
    </script>
  </body>
</html>
