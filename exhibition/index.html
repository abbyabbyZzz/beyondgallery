<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <title>Gallery Beyond - 360 Exhibition</title>
    <link rel="stylesheet" href="../css/styles.css" />

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
      .back-home {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 12px 32px;
        background: transparent;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        font-family: inherit;
        font-weight: 400;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        z-index: 50;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-size: 11px;
        backdrop-filter: blur(12px);
      }
      .back-home:hover {
        background: rgba(255, 255, 255, 0.9);
        color: #050508;
        border-color: rgba(255, 255, 255, 0.9);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      }

      @media (max-width: 768px) {
        .back-home {
          top: 14px;
          left: 14px;
          padding: 8px 20px;
          font-size: 10px;
          letter-spacing: 2px;
        }
      }
    </style>

    <script>
      // 切换房间逻辑
      var currentRoom = 1;
      function changeRoom(direction) {
        currentRoom = currentRoom + direction;
        if (currentRoom > 2) currentRoom = 1;
        else if (currentRoom < 1) currentRoom = 2;

        var sky = document.getElementById('main-sky');
        var r1 = document.getElementById('room-1-art');
        var r2 = document.getElementById('room-2-art');

        if (!sky || !r1 || !r2) return;

        if (currentRoom === 1) {
          sky.setAttribute('../room1.jpg', '#bg-room1');
          r1.setAttribute('visible', 'true');
          r1.setAttribute('position', '0 0 0');
          r2.setAttribute('visible', 'false');
          r2.setAttribute('position', '0 -100 0');
        } else {
          sky.setAttribute('src', '#bg-room2');
          r1.setAttribute('visible', 'false');
          r1.setAttribute('position', '0 -100 0');
          r2.setAttribute('visible', 'true');
          r2.setAttribute('position', '0 0 0');
        }
      }

      // 展板开关逻辑
      function toggleInfo(infoId) {
        var infoPanel = document.getElementById(infoId);
        if (!infoPanel) return;
        var isVisible = infoPanel.getAttribute('visible') === 'true';
        infoPanel.setAttribute('visible', String(!isVisible));
      }
    </script>
  </head>
  <body>
    <a
      href="../index.html"
      class="back-home"
      onclick="navigateWithTransition('../index.html'); return false;"
      >Back to Main Menu</a
    >

    <a-scene renderer="antialias: true">
      <a-assets>
        <img
          id="bg-room1"
          src="../room1.jpg"
          crossorigin="anonymous"
        />
        <img
          id="bg-room2"
          src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg"
          crossorigin="anonymous"
        />
        <img id="monet-art" src="../art.png" />
        <img id="art2" src="../art2.png" />

        <audio
          id="bgm-audio"
          src="../bgm.mp3"
          preload="auto"
          loop="true"
        ></audio>
      </a-assets>

      <a-sky id="main-sky" src="#bg-room1" rotation="0 -90 0"></a-sky>

      <a-entity id="room-1-art" visible="true" position="0 0 0">
        <a-entity position="0 2 -4">
          <a-image
            class="clickable"
            src="#monet-art"
            position="0 0 0.05"
            width="1.8"
            height="1.3"
            onclick="toggleInfo('info-monet')"
          ></a-image>
          <a-plane
            position="0 0 0"
            width="2.0"
            height="1.5"
            color="#FFFFFF"
          ></a-plane>
          <a-plane
            position="0 0 -0.05"
            width="2.2"
            height="1.7"
            color="#DDDDDD"
          ></a-plane>

          <a-entity id="info-monet" position="2.2 0 0.2" visible="false">
            <a-plane width="1.8" height="1.8" color="#F9F9F9"></a-plane>
            <a-text
              value="Impression, Sunrise"
              position="-0.8 0.6 0.02"
              color="#111111"
              width="1.8"
              weight="bold"
            ></a-text>
            <a-text
              value="Claude Monet | 1872"
              position="-0.8 0.4 0.02"
              color="#666666"
              width="1.2"
            ></a-text>
            <a-text
              value="This painting is famous for giving a name to the Impressionist movement. It depicts the port of Le Havre, Monet's hometown, and captures the ephemeral effects of light and color at dawn. The blurred outlines and focus on light were highly controversial at the time."
              position="-0.8 0 0.02"
              color="#333333"
              width="1.6"
              wrap-count="32"
              baseline="center"
            ></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="room-2-art" visible="false" position="0 -100 0">
        <a-entity position="0 2 -4">
          <a-image
            class="clickable"
            src="#art2"
            position="0 0 0.05"
            width="1.8"
            height="1.3"
            onclick="toggleInfo('info-art2')"
          ></a-image>
          <a-plane
            position="0 0 0"
            width="2.0"
            height="1.5"
            color="#FFFFFF"
          ></a-plane>
          <a-plane
            position="0 0 -0.05"
            width="2.2"
            height="1.7"
            color="#DDDDDD"
          ></a-plane>

          <a-entity id="info-art2" position="2.2 0 0.2" visible="false">
            <a-plane width="1.8" height="1.8" color="#F9F9F9"></a-plane>
            <a-text
              value="Portrait of Wally Neuzil"
              position="-0.8 0.6 0.02"
              color="#111111"
              width="1.8"
              weight="bold"
            ></a-text>
            <a-text
              value="Egon Schiele | 1912"
              position="-0.8 0.4 0.02"
              color="#666666"
              width="1.2"
            ></a-text>
            <a-text
              value="This iconic portrait depicts Walburga 'Wally' Neuzil, Schiele's muse and lover. Known for its emotional intensity and the subject's captivating, melancholic gaze, it is considered a true masterpiece of Austrian Expressionism."
              position="-0.8 0 0.02"
              color="#333333"
              width="1.6"
              wrap-count="32"
              baseline="center"
            ></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity position="-1 0.1 -2">
        <a-circle
          class="clickable"
          rotation="-90 0 0"
          radius="0.25"
          color="#FFFFFF"
          onclick="changeRoom(-1)"
        ></a-circle>
        <a-text
          value="Previous Room"
          position="0 0.4 0"
          align="center"
          color="#333"
          scale="0.8 0.8 0.8"
        ></a-text>
      </a-entity>

      <a-entity position="1 0.1 -2">
        <a-circle
          class="clickable"
          rotation="-90 0 0"
          radius="0.25"
          color="#FFFFFF"
          onclick="changeRoom(1)"
        ></a-circle>
        <a-text
          value="Next Room"
          position="0 0.4 0"
          align="center"
          color="#333"
          scale="0.8 0.8 0.8"
        ></a-text>
      </a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor
          color="white"
          raycaster="objects: .clickable"
        ></a-cursor>
      </a-entity>
    </a-scene>

    <script src="../js/bgm.js"></script>
    <script src="../js/transition.js"></script>
  </body>
</html>
