<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <title>Work Detail · Gallery Beyond</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
      body.detail-page {
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        background: #050508;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      #detail-root {
        position: relative;
        z-index: 10;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 32px;
        box-sizing: border-box;
      }
      @media (max-width: 1024px) {
        #detail-root {
          padding: 72px 20px 28px;
        }
      }
      @media (max-width: 768px) {
        #detail-root {
          padding: 64px 16px 22px;
        }
      }

      .detail-back-row {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 120;
        padding: 20px 24px;
        pointer-events: none;
      }
      .detail-back-row > * {
        pointer-events: auto;
      }
      .detail-back-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      @media (max-width: 768px) {
        .detail-back-row {
          padding: 14px 14px;
          gap: 8px;
        }
      }

      .back-exhibition,
      .back-home {
        display: inline-block;
        padding: 11px 26px;
        background: rgba(26, 26, 26, 0.85);
        color: rgba(255, 255, 255, 0.92);
        text-decoration: none;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .back-exhibition:hover,
      .back-home:hover {
        background: rgba(255, 255, 255, 0.92);
        color: #0a0a0a;
      }

      /* Modal: pure black, hairline border, no “solid” fill effects */
      .detail-card {
        width: min(1680px, calc(100vw - 24px));
        max-width: 100%;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: #000000;
        overflow: hidden;
      }
      @media (max-width: 1024px) {
        .detail-card {
          border-radius: 18px;
        }
      }
      @media (max-width: 768px) {
        .detail-card {
          width: calc(100vw - 16px);
          border-radius: 16px;
        }
      }

      .detail-card__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding: 20px 24px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: #000000;
      }
      @media (max-width: 768px) {
        .detail-card__head {
          padding: 16px 16px 14px;
          gap: 12px;
        }
      }
      .detail-card__head h2 {
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.98);
        margin: 0;
        line-height: 1.25;
      }
      @media (max-width: 768px) {
        .detail-card__head h2 {
          font-size: 1.05rem;
        }
      }
      .detail-card__head-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      @media (max-width: 768px) {
        .detail-card__head-actions {
          width: 100%;
          justify-content: space-between;
          gap: 8px;
        }
      }
      .badge-digital {
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 9px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: #000000;
      }

      .work-picker {
        position: relative;
        min-width: 200px;
      }
      @media (max-width: 768px) {
        .work-picker {
          min-width: 0;
          width: 100%;
        }
      }
      .work-picker__btn {
        width: 100%;
        padding: 9px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: #000000;
        color: rgba(255, 255, 255, 0.9);
        font-size: 10px;
        letter-spacing: 1.5px;
        cursor: pointer;
        text-align: left;
      }
      @media (max-width: 768px) {
        .work-picker__btn {
          padding: 10px 14px;
          font-size: 10px;
        }
      }
      .work-picker__btn:hover {
        border-color: rgba(255, 255, 255, 0.28);
      }
      .work-picker__panel {
        display: none;
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        min-width: 220px;
        max-height: min(46vh, 360px);
        overflow-y: auto;
        border-radius: 0;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: #000000;
        z-index: 20;
      }
      @media (max-width: 768px) {
        .work-picker__panel {
          left: 0;
          right: 0;
          min-width: 0;
          width: 100%;
        }
      }
      .work-picker__panel.open {
        display: block;
      }
      .work-picker__panel button {
        display: block;
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: transparent;
        color: rgba(255, 255, 255, 0.9);
        font-size: 12px;
        text-align: left;
        cursor: pointer;
      }
      .work-picker__panel button:last-child {
        border-bottom: none;
      }
      .work-picker__panel button:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .work-picker__panel button.is-current {
        background: rgba(255, 255, 255, 0.08);
      }

      .detail-card__body {
        display: grid;
        grid-template-columns: 0.88fr 1.12fr;
        align-items: stretch;
        background: #000000;
        min-height: min(58vh, 780px);
      }
      @media (max-width: 900px) {
        .detail-card__body {
          grid-template-columns: 1fr;
          min-height: 0;
        }
        .detail-info-wrap {
          border-left: none !important;
          border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
      }

      /* Left: 360 viewer — 2:1 baseline, min-height keeps the window taller on wide screens */
      .detail-viewer-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 2 / 1;
        min-height: min(48vh, 560px);
        background: #000000;
      }
      @media (max-width: 900px) {
        .detail-viewer-wrap {
          min-height: min(44vh, 520px);
        }
      }
      @media (max-width: 768px) {
        /* Phone landscape: give the viewer a bit more height */
        .detail-viewer-wrap {
          min-height: min(56vh, 520px);
        }
      }
      .viewer-hint {
        position: absolute;
        z-index: 5;
        pointer-events: none;
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      .viewer-hint--tl {
        top: 14px;
        left: 14px;
      }
      .viewer-hint--tr {
        top: 14px;
        right: 14px;
        text-align: right;
        max-width: 55%;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 1.2px;
        text-transform: none;
        font-size: 10px;
      }
      @media (max-width: 768px) {
        .viewer-hint--tr {
          max-width: 68%;
          font-size: 10px;
          letter-spacing: 1px;
        }
      }
      .viewer-layer {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
      }
      .detail-viewer-wrap a-scene {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #viewer-glb {
        display: none;
      }
      #viewer-glb model-viewer {
        width: 100%;
        height: 100%;
        background-color: #000;
        --poster-color: transparent;
      }

      .model-switch {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        background: rgba(10, 10, 12, 0.45);
        color: rgba(255, 255, 255, 0.92);
        font-size: 18px;
        line-height: 1;
        z-index: 30;
        cursor: pointer;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: none;
      }
      .model-switch:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .model-switch:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .model-switch.left {
        left: 12px;
      }
      .model-switch.right {
        right: 12px;
      }

      /* Right: text — same flat black, optional hairline only from grid */
      .detail-info-wrap {
        padding: 24px 28px;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: stretch;
        background: #000000;
        min-height: 0;
      }
      @media (max-width: 900px) {
        .detail-info-wrap {
          padding: 18px 18px;
        }
      }
      .detail-info-card {
        flex: 1;
        padding: 0;
        border: none;
        background: #000000;
        display: flex;
        flex-direction: column;
        gap: 14px;
        justify-content: center;
      }
      .detail-info-card h1 {
        font-size: clamp(1.15rem, 2vw, 1.5rem);
        font-weight: 600;
        letter-spacing: 0.03em;
        color: rgba(255, 255, 255, 0.98);
        margin: 0;
        line-height: 1.3;
      }
      .detail-info-card .art-line {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.04em;
      }
      .detail-info-card .art-desc {
        font-size: 14px;
        line-height: 1.75;
        color: rgba(255, 255, 255, 0.78);
        max-height: min(52vh, 480px);
        overflow-y: auto;
      }
      @media (max-width: 900px) {
        .detail-info-card .art-desc {
          max-height: none;
        }
      }

      .edge-nav {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.38);
        background: rgba(10, 10, 12, 0.55);
        color: rgba(255, 255, 255, 0.94);
        font-size: 20px;
        line-height: 1;
        z-index: 150;
        pointer-events: auto;
        cursor: pointer;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .edge-nav:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .edge-nav.left {
        left: 14px;
      }
      .edge-nav.right {
        right: 14px;
      }
    </style>
  </head>
  <body class="detail-page">
    <div class="rotate-overlay" id="rotate-overlay" aria-hidden="true">
      <div class="rotate-card" role="dialog" aria-modal="true" aria-label="Rotate device">
        <div class="rotate-label">Notice</div>
        <div class="rotate-title">Please rotate your device</div>
        <p class="rotate-desc">This experience is best viewed in landscape orientation.</p>
      </div>
    </div>
    <div class="detail-back-row">
      <a
        href="../index.html"
        class="back-home"
        onclick="navigateWithTransition('../index.html'); return false;"
        >Back to Home</a
      >
      <a
        href="../exhibition/index.html"
        class="back-exhibition"
        onclick="navigateWithTransition('../exhibition/index.html'); return false;"
        >Back to Exhibition</a
      >
    </div>

    <div id="detail-root">
      <div class="detail-card">
        <header class="detail-card__head">
          <h2 id="modal-header-title">Artwork title</h2>
          <div class="detail-card__head-actions">
            <span class="badge-digital">Digital presentation</span>
            <div class="work-picker" id="work-picker">
              <button type="button" class="work-picker__btn" id="work-picker-btn" aria-expanded="false" aria-haspopup="listbox">
                Select artwork ▾
              </button>
              <div class="work-picker__panel" id="work-picker-panel" role="listbox" aria-label="Works list"></div>
            </div>
          </div>
        </header>

        <div class="detail-card__body">
          <div class="detail-viewer-wrap" id="viewer-shell">
            <span class="viewer-hint viewer-hint--tl" id="viewer-hint-tl">HD image</span>
            <span class="viewer-hint viewer-hint--tr" id="viewer-hint-tr">Drag to look around</span>
            <div id="viewer-panorama" class="viewer-layer">
              <a-scene
                id="viewer-scene"
                embedded
                vr-mode-ui="enabled: false"
                loading-screen="enabled: false"
                renderer="antialias: true"
              >
                <a-assets>
                  <img id="art360" src="" crossorigin="anonymous" />
                </a-assets>
                <a-sky id="art-sky" src="#art360" rotation="0 -90 -30"></a-sky>
                <a-entity
                  id="detail-camera"
                  camera
                  look-controls="pointerLockEnabled: false"
                  position="0 1.6 0"
                  rotation="-14 0 0"
                ></a-entity>
              </a-scene>
            </div>
            <div id="viewer-glb" class="viewer-layer" aria-hidden="true">
              <model-viewer
                id="model-viewer-glb"
                src=""
                alt="3D model"
                camera-controls
                touch-action="none"
                interaction-prompt="none"
                exposure="1"
                shadow-intensity="0.85"
              ></model-viewer>
            </div>
            <button type="button" id="model-prev-btn" class="model-switch left" aria-label="Previous model">&lt;</button>
            <button type="button" id="model-next-btn" class="model-switch right" aria-label="Next model">&gt;</button>
          </div>

          <div class="detail-info-wrap">
            <div class="detail-info-card">
              <h1 id="art-title">Artwork title</h1>
              <p class="art-line" id="art-line">Artist name · Year</p>
              <p class="art-desc" id="art-desc">Description placeholder.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button type="button" id="artwork-prev-btn" class="edge-nav left" aria-label="Previous work">&lt;</button>
    <button type="button" id="artwork-next-btn" class="edge-nav right" aria-label="Next work">&gt;</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="../js/starfield.js"></script>
    <script src="../js/bgm.js"></script>
    <script src="../js/transition.js"></script>
    <script>
      (function () {
        (function () {
          function shouldBlockPortrait() {
            var isCoarse = false;
            try {
              isCoarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
            } catch (e) {}
            var small = Math.min(window.innerWidth || 0, window.innerHeight || 0) <= 820;
            var isMobileLike = isCoarse || small;
            var isPortrait = (window.innerHeight || 0) > (window.innerWidth || 0);
            return isMobileLike && isPortrait;
          }

          function updateRotateOverlay() {
            var el = document.getElementById('rotate-overlay');
            if (!el) return;
            var show = shouldBlockPortrait();
            el.classList.toggle('is-visible', show);
            el.setAttribute('aria-hidden', show ? 'false' : 'true');
          }

          window.addEventListener('resize', updateRotateOverlay);
          window.addEventListener('orientationchange', updateRotateOverlay);
          updateRotateOverlay();
        })();

        var FOCUSED_BASE = '../360/focused-artwork/';
        var SKY_ROTATION_DEFAULT = '0 -90 -30';
        /* Work 2: default roll +20° → −10° on Z */
        var SKY_ROTATION_WORK_2 = '0 -90 -10';
        /* Work 11: rotate panorama +5° on Y */
        var SKY_ROTATION_WORK_11 = '0 -85 -30';
        /* Work 16: set panorama roll to 0 */
        var SKY_ROTATION_WORK_16 = '0 -90 0';
        /* Work 17: set panorama roll to 0 */
        var SKY_ROTATION_WORK_17 = '0 -90 0';
        var SKY_ROTATION_WORK_22 = '0 -90 0';
        var WORK_MIN = 1;
        var WORK_MAX = 23;
        var STORAGE_WORK_ID = 'gallery_last_work_id';

        /**
         * Initial camera aim: slight look-up so the view isn’t aimed at the floor.
         * A-Frame: negative X pitch ≈ look up toward wall / artwork height.
         * Tune INITIAL_CAMERA_PITCH (e.g. −10 … −18) if needed.
         */
        var INITIAL_CAMERA_PITCH = -14;
        var INITIAL_CAMERA_YAW = 0;

        var DEFAULT_META = {
          title: 'Artwork title',
          author: 'Artist name',
          year: '',
          medium: '',
          description:
            'Description placeholder — add catalogue text in WORK_META per work id, or edit DEFAULT_META.'
        };
        /* Per work: { title, author, year, medium, description } — year/medium optional */
        var WORK_META = {
          1: {
            title: 'Orchard',
            author: 'Alexander Denis',
            year: '2025',
            medium: 'Acrylic on hardboard',
            description:
              'Orchard depicts a public park near my house. I wanted to show a landscape that was obviously painted. The work was created by cutting paper stencils from a full sketch and then wildly flicking paint onto the canvas. The strict borders of the stencils contrast the erratic patterns of the paint, mixing realistic form and abstracted texture.\n\nElements of fantasy are incorporated into the otherwise standard setting to turn a landscape that left little to the imagination, into one which asks questions about where it is situated in time. The hues of the scene are exaggerated, objects are omitted, light and shadow remain ambiguous, and in multiple places the underpainting shows through. Do the brown tones of the land hint at a transition from summer to autumn, or winter to spring - is there even a transition depicted at all? Is the time of day represented by the sun-like object in the sky, or is that a simple background texture?'
          },
          2: {
            author: 'Layla Waters',
            // Two separate 3D models under one work id:
            // 2_1 = Wanderer, 2_2 = Angel Eyes
            variants: [
              {
                title: 'Wanderer',
                year: '2025',
                medium: 'Watercolour and coloured pencil on paper',
                description: ''
              },
              {
                title: 'Angel Eyes',
                year: '2026',
                medium: 'Colour pencil on paper',
                description: ''
              }
            ]
          },
          3: {
            title: 'Allegory of Creation',
            author: 'Marissa Maennling',
            year: '2025',
            medium: 'Cyanotype on cotton',
            description:
              '“This piece is a cyanotype print that combines the iconic Venus of Willendorf and the Cueva de las Manos in a collage-like composition. The work is meant to act as a criticism of artificial intelligence by prompting discussion around appropriation through the use of an inherently tactile and indexical medium. This work posits creativity as intrinsic to human nature, urging viewers towards embracing creation as an act of resistance.”'
          },
          4: {
            title: 'A Quite Temptation',
            author: 'Mai Shimla',
            year: '2025',
            medium: 'Digital photograph',
            description:
              '“This photograph reinterprets the Snow White narrative through a staged moment capturing her first bite of the apple, focusing on vulnerability, temptation, and visual contrast. I began with a clear visual plan, scouting locations until I found a setting where the surrounding greenery could create a saturated backdrop. To achieve the colour intensity I envisioned, I used an external portable LED light to control highlights and deepen the contrast between the green grass and the red apple, allowing these elements to stand out while keeping attention on the model as the central focus.\n\nI directed the model’s pose and positioning deliberately, considering how the body, gaze, and placement of the apple could suggest tension without revealing the full narrative. My process centers on constructing staged imagery and drawing from familiar visual references such as fairy tales. I am motivated by an aesthetic that emphasizes strong lighting, careful composition, and bold use of colour, which runs throughout my work. Through this photograph, I use these visual decisions to shape the atmosphere and invite open interpretation.”'
          },
          5: {
            title: 'Inheritance',
            author: 'Jay Barclay',
            year: '2025',
            medium: 'Chalk pastel on black Fabriano paper',
            description:
              '“Inheritance considers how our histories are predetermined and how our habits are handed down. When I was a child, my grandmother would give me a shot of whiskey to put me to sleep on long nights plagued by insomnia. This practice of drinking with the reward of sleep is one that I find myself occasionally indulging in. Like in Edward Munch’s Inheritance (1897-99), where a baby was damned to inherit syphilis from its mother, I used my family’s history of alcoholism and susception to addiction as an interpretation of history. My sense of entrapment in this cycle is conveyed through the confines of my family’s vice, an alcohol bottle. The discomfort shown in my position is intended to demonstrate my knowledge and weariness of my family’s past. Because I have historically used alcohol as an effective sleep support though, there is a simultaneously peaceful, restful expression. In this way, Inheritance examines the genetic and social factors that influence our lives.”'
          },
          6: {
            title: 'Inner',
            author: 'Ella Jiang',
            year: '2025',
            medium: 'Etching and aquatint on paper',
            description:
              '“This is a series of three and also uses the etching technique. The theme of the artworks is about the changes in inner feelings. The first one is to express the feelings of confusion and chaos. Therefore, I represent a scene of flowing water and bubbles to convey the confusion in my mind. The second one is about struggling and being trapped. I compare myself to a puppet about to shatter from the stress. I used spider rape to illustrate the tight wire, expressing my feeling as a trapped insect and the helplessness of being unable to escape. The last one is to illustrate the motion of breaking through and being reborn. This scene illustrates burning through the paper, and in the center of the scene is the black that I was trying to burn through. I applied soft ground to this piece and used plastic wrap to increase the texture.”'
          },
          7: {
            title: 'Anonymous Was a Woman',
            author: 'Isabella Iacoe',
            year: '2025',
            medium: 'Crochet wall hanging',
            description:
              '“Of the countless handmade doilies that can be found in museum collections, thrift stores, and antique shops, practically none can be attributed to a named creator.\n\nThe doily can trace its lineage to the Victorian era, where domestic craft objects – most often produced by women – were seen as reflections of taste, skill, and ability to maintain a home. Yet, such objects were historically perceived as being produced by amateurs rather than by skilled artisans. As the doily fell out of fashion in the modern home, the names of many female creators would become lost to time.\n\nInspired by second-wave feminist artists who reclaimed craft for use in art, my project brings new attention to the doily and serves as a dedication to some of the anonymous craftswomen of history. The doily uses filet crochet in adapting a quote from Virginia Woolf’s A Room of One\'s Own – “I would venture to guess that Anon, who wrote so many poems without signing them, was often a woman.”\n\nAnonymous Was a Woman aims to challenge perceptions of women’s craft and to recognize doily makers of the past for their invisible labour and artistry.”'
          },
          8: {
            title: 'The Space I Take',
            author: 'Charlotte Rangaratnum',
            year: '2025',
            medium: 'Acrylic marker on paper',
            description:
              '“After moving into a new house in September of last year, I found that I was incredibly uncomfortable in every room I was in. I had this feeling that I was taking up too much space in some places, and not enough in others. I started working on The Space I Take after I noticed myself obsessing over how I was being perceived in spaces even outside of my house. This piece was an attempt at visually depicting that unease, through oddly shaped panels, highly saturated colours, and the distorted image of myself. I wanted to find a way to present my anxieties in a way that would make sense for others, while also helping myself to move past those feelings altogether. This work was heavily influenced by elements of comic book illustration. I tried to imitate the ways in which the shape of comic panels are used to supplement the story being told, by creating a link between the size and shape of the panel, and the amount of space each figure takes up.”'
          },
          9: {
            title: 'The Golden Temple',
            author: 'Kauri Krishnar',
            year: '2025',

                  mv.addEventListener('error', function () {
                    var wid = mv.__glbWorkId;
                    var vidx = mv.__glbVariantIdx;
                    var list = mv.__glbCandidates || [];
                    if (!list.length) return;
                    var nextIdx = (mv.__glbCandidateIdx + 1) % list.length;
                    if (nextIdx === mv.__glbCandidateIdx) return;
                    mv.__glbCandidateIdx = nextIdx;
                    setModelCandidateIndex(wid, vidx, nextIdx);
                    try {
                      mv.setAttribute('src', list[nextIdx]);
                    } catch (e) {}
                  });
                }
                if (glbSrc && mv.getAttribute('src') !== glbSrc) {
                  mv.setAttribute('src', glbSrc);
                }
                mv.setAttribute('alt', 'Work ' + id + ' — 3D model');
              }
              applyViewerHints(true);
              requestAnimationFrame(function () {
                window.dispatchEvent(new Event('resize'));
                if (mv && typeof mv.updateSize === 'function') {
                  mv.updateSize();
                }
              });
            } else {
              updateModelSwitchUI(false);
              if (pano) pano.style.display = 'block';
              if (glbWrap) {
                glbWrap.style.display = 'none';
                glbWrap.setAttribute('aria-hidden', 'true');
              }
              if (img) img.setAttribute('src', src);
              if (sky) {
                sky.setAttribute('src', src);
                sky.setAttribute('rotation', getSkyRotationForWork(id));
              }
              resetViewerCamera();
              applyViewerHints(false);
              if (scene && typeof scene.resize === 'function') {
                scene.resize();
              }
            }
          } catch (e) {
            applyViewerHints(false);
          }
        }

        function getTitleFor(id) {
          var row = WORK_META[id] || WORK_META[String(id)] || null;
          if (row && Array.isArray(row.variants) && row.variants.length) {
            var titles = row.variants
              .map(function (v) { return v && v.title != null ? String(v.title).trim() : ''; })
              .filter(Boolean);
            if (titles.length) return titles.join(' / ');
          }
          if (row && Array.isArray(row.works) && row.works.length) {
            var titles2 = row.works
              .map(function (w) { return w && w.title != null ? String(w.title).trim() : ''; })
              .filter(Boolean);
            if (titles2.length) return titles2.join(' / ');
          }
          var m = getMetaFor(id);
          var title = m && m.title != null ? String(m.title).trim() : '';
          return title || 'Artwork';
        }

        function setPickerOpen(open) {
          var panel = document.getElementById('work-picker-panel');
          var btn = document.getElementById('work-picker-btn');
          if (!panel || !btn) return;
          panel.classList.toggle('open', open);
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        function syncPickerCurrent(currentId) {
          var panel = document.getElementById('work-picker-panel');
          if (!panel) return;
          panel.querySelectorAll('button[data-work-id]').forEach(function (b) {
            var wid = parseInt(b.getAttribute('data-work-id'), 10);
            b.classList.toggle('is-current', wid === currentId);
          });
        }

        function initWorkPicker() {
          var wrap = document.getElementById('work-picker');
          var panel = document.getElementById('work-picker-panel');
          var btn = document.getElementById('work-picker-btn');
          if (!wrap || !panel || !btn) return;
          panel.innerHTML = '';
          for (var n = WORK_MIN; n <= WORK_MAX; n++) {
            (function (wid) {
              var opt = document.createElement('button');
              opt.type = 'button';
              opt.setAttribute('role', 'option');
              opt.setAttribute('data-work-id', String(wid));
              opt.textContent = getTitleFor(wid);
              opt.addEventListener('click', function () {
                setPickerOpen(false);
                if (wid === getWorkId()) return;
                navigateWithTransition('index.html?id=' + wid);
              });
              panel.appendChild(opt);
            })(n);
          }
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            setPickerOpen(!panel.classList.contains('open'));
          });
          document.addEventListener('click', function () {
            setPickerOpen(false);
          });
          wrap.addEventListener('click', function (e) {
            e.stopPropagation();
          });
        }

        function goWork(delta) {
          var id = getWorkId();
          var next = id + delta;
          if (next < WORK_MIN) next = WORK_MAX;
          if (next > WORK_MAX) next = WORK_MIN;
          navigateWithTransition('index.html?id=' + next);
        }

        var id = getWorkId();
        syncWorkIdQueryParam(id);
        initWorkPicker();
        applyWork(id);

        var prevBtn = document.getElementById('artwork-prev-btn');
        var nextBtn = document.getElementById('artwork-next-btn');
        if (prevBtn) prevBtn.addEventListener('click', function () { goWork(-1); });
        if (nextBtn) nextBtn.addEventListener('click', function () { goWork(1); });

        function initModelSwitchControls() {
          var prev = document.getElementById('model-prev-btn');
          var next = document.getElementById('model-next-btn');
          if (!prev || !next) return;
          function step(delta) {
            var id = getWorkId();
            var list = getGlbVariantsForWork(id);
            if (list.length <= 1) return;
            var idx = getModelVariantIndex(id, list.length);
            var nextIdx = (idx + delta + list.length) % list.length;
            setModelVariantIndex(id, nextIdx);
            // Reset candidate choice when switching variants
            setModelCandidateIndex(id, nextIdx, 0);
            applyWork(id);
          }
          prev.addEventListener('click', function (e) {
            e.stopPropagation();
            step(-1);
          });
          next.addEventListener('click', function (e) {
            e.stopPropagation();
            step(1);
          });
        }
        initModelSwitchControls();
      })();
    </script>
  </body>
</html>
